name: Flight Deal Tracker

on:
  schedule:
    # Every 2 hours, 12 runs/day. ~84 SerpApi calls/week, ~168/2 weeks per
    # route tracked -- stays within the 250/month free-tier quota as long
    # as routes.json only has 1 route. Drop back to 2x/day (see git history)
    # once you're done actively hunting for a deal.
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: flight-deal-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight tracker
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py
