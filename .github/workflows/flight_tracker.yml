name: Flight Deal Tracker

on:
  schedule:
    # Every 2 hours, 12 runs/day. Each route now expands to a date/night-count
    # window (see routes.json) instead of one fixed date pair; by default only
    # COMBOS_PER_RUN (default 1) combos from that window are checked per run,
    # rotating through the rest over subsequent runs -- so API usage per route
    # stays at ~12 calls/day, same as a single fixed date, while still cycling
    # through the whole window every few days. Raise COMBOS_PER_RUN (repo
    # variable/secret) only if your SerpApi quota can absorb more calls/day.
    # Drop back to 2x/day (see git history) once you're done actively hunting.
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: flight-deal-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight tracker
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py
